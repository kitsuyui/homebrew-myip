name: test macOS installation
on:
  - pull_request

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check shell scripts
        run: shellcheck generate.sh

  test_installation:
    strategy:
      matrix:
        # Current GitHub-hosted macOS runner labels:
        # https://github.com/actions/runner-images?tab=readme-ov-file#available-images
        macos: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.macos }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Homebrew
        run: |
          brew tap kitsuyui/myip  # kitsuyui/myip => kitsuyui/homebrew-myip

      - name: Checkout branch
        run: |
          INSTALLED_PATH="$(brew --repo kitsuyui/myip)"
          cd "$INSTALLED_PATH"
          git checkout "$BRANCH"
        if: ${{ github.head_ref != 'main' }}
        env:
          BRANCH: ${{ github.head_ref }}

      - name: Test installation
        run: |
          uname -m
          brew install myip
          myip --help

        env:
          HOMEBREW_NO_AUTO_UPDATE: '1'
          HOMEBREW_NO_INSTALL_CLEANUP: '1'
          HOMEBREW_NO_ENV_HINTS: '1'
